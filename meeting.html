<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting Documents — Town Board Meetings</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .subfolder-section { margin-top: 2rem; }
    .subfolder-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 0;
      border-bottom: 2px solid #A59664;
      margin-bottom: 0;
    }
    .subfolder-header svg { flex-shrink: 0; }
    .subfolder-name {
      font-family: 'Electrolize', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: #193C3C;
      letter-spacing: 0.02em;
    }
    .subfolder-count {
      font-size: 0.8rem;
      color: #666;
      margin-left: auto;
    }
    .subfolder-link {
      font-size: 0.8rem;
      color: #00505A;
      text-decoration: none;
      white-space: nowrap;
    }
    .subfolder-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="topbar">
  <a class="brand" href="https://winchesterwi.com">
    <img src="winchester-logo.png" class="seal-logo" alt="Town of Winchester">
    <span class="brand-name">TOWN OF WINCHESTER, WI</span>
  </a>
  <a class="back-link" href="index.html">&#8592; Back to portal home</a>
</div>
<div class="hero">
  <div class="hero-label" id="hero-label">Town Board Meetings</div>
  <h1 id="page-title">Meeting Documents</h1>
  <nav class="breadcrumb" aria-label="Breadcrumb" id="breadcrumb"></nav>
</div>
<div class="next-bar" id="next-bar" style="display:none;">
  <div class="next-dot"></div>
  <div class="next-text" id="next-text"></div>
</div>
<main>
  <div id="stat-tiles-container"></div>
  <div class="page-body">
    <div class="filter-bar" id="filter-bar"></div>
    <div class="file-list" id="file-list">
      <div class="no-docs">Loading&hellip;</div>
    </div>
    <div id="subfolders-container"></div>
  </div>
</main>
<footer>
  <span>Town of Winchester &middot; Winchester, WI 54557 &middot; (715) 686-2123</span>
  <a href="https://winchesterwi.com">winchesterwi.com &rarr;</a>
</footer>
<script src="shared.js"></script>
<script>
async function init() {
  try {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (!id) { window.location.href = 'town-board.html'; return; }
    const data = await loadData();
    const meetings = data.meetings || [];
    const meeting = meetings.find(m => m.id === id);
    if (!meeting) { window.location.href = 'town-board.html'; return; }
    document.title = meeting.title + ' — Town Board Meetings';
    document.getElementById('page-title').textContent = meeting.title;
    const isSpecial = meeting.type === 'special';
    const backHref = isSpecial ? 'previous-special.html' : 'previous-regular.html';
    const backLabel = isSpecial ? 'Previous Special Meetings' : 'Previous Regular Meetings';
    document.getElementById('breadcrumb').innerHTML = `
      <a href="index.html">Home</a>
      <span>/</span>
      <a href="town-board.html">Town Board</a>
      <span>/</span>
      <a href="${backHref}">${backLabel}</a>
      <span>/</span>
      <span style="color:rgba(255,255,255,0.8);">${meeting.title}</span>`;
    const upcoming = meetings.find(m => m.status === 'upcoming');
    if (upcoming) {
      const parts = [upcoming.time, upcoming.location].filter(Boolean).join(' \u00b7 ');
      document.getElementById('next-text').innerHTML = `Next meeting &mdash; <strong>${formatDate(upcoming.date)}</strong>${parts ? ' \u00b7 ' + parts : ''}`;
      document.getElementById('next-bar').style.display = 'flex';
    }
    const docs = meeting.documents || [];
    const subfolders = meeting.subfolders || [];
    const totalDocsHere = docs.length + subfolders.reduce((sum, sf) => sum + (sf.documents || []).length, 0);
    document.getElementById('stat-tiles-container').innerHTML = renderStatTiles(data, totalDocsHere);
    document.getElementById('filter-bar').innerHTML = `
      <button class="filter-btn active" onclick="filterFiles('all', this, 'file-list')">All files</button>
      <button class="filter-btn" onclick="filterFiles('agenda', this, 'file-list')">Agendas</button>
      <button class="filter-btn" onclick="filterFiles('minutes', this, 'file-list')">Minutes</button>`;
    if (!docs.length && !subfolders.length) {
      document.getElementById('file-list').innerHTML = '<div class="no-docs">No documents posted yet.</div>';
      return;
    }
    document.getElementById('file-list').innerHTML = docs.map(doc => renderFileRow(doc)).join('');

    // Render subfolders (Financial, etc.) below main documents
    if (subfolders.length) {
      const sfContainer = document.getElementById('subfolders-container');
      let sfHtml = '';
      for (const sf of subfolders) {
        const sfDocs = sf.documents || [];
        const folderLinkHtml = sf.url
          ? `<a class="subfolder-link" href="${sf.url}" target="_self">Open folder &rarr;</a>`
          : '';
        sfHtml += `
          <div class="subfolder-section">
            <div class="subfolder-header">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#A59664" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
              <span class="subfolder-name">${sf.name}</span>
              <span class="subfolder-count">${sfDocs.length} document${sfDocs.length !== 1 ? 's' : ''}</span>
              ${folderLinkHtml}
            </div>
            <div class="file-list">
              ${sfDocs.length ? sfDocs.map(doc => renderFileRow(doc)).join('') : '<div class="no-docs">No documents in this folder.</div>'}
            </div>
          </div>`;
      }
      sfContainer.innerHTML = sfHtml;
    }
  } catch (e) {
    document.getElementById('file-list').innerHTML = '<div class="error-msg">Unable to load documents. Please try again later.</div>';
  }
}
init();
</script>
</body>
</html>
